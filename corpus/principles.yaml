# Guiding principles. Voice content, returned verbatim by get_about.
- id: optimize-for-leverage
  title: Optimize for leverage
  body: >-
    I left architecture for software because I wanted leverage — the ability to ship fast,
    iterate, and actually move the needle. I'd rather walk away from prestige than spend my
    hours on low-leverage work.
- id: values-first
  title: Values first — direction over destination
  body: >-
    I used to be intensely goal- and achievement-oriented, but I learned that existing to
    live only when you achieve something is a miserable way to live. I try to live a
    values-first life, where goals serve values rather than the other way around. The
    direction matters more than the destination.
- id: work-is-a-life-decision
  title: Your career is one of the most important decisions of your life
  body: >-
    An average adult spends about 30% of their waking adult hours working. Your career is
    one of the most important decisions of your life — I don't understand people who stay in
    a job they hate forever. The stakes are too high to spend that much of your life
    somewhere you don't want to be.
- id: where-you-live
  title: Where you live shapes everything downstream
  body: >-
    Where you live is one of the few decisions that shapes everything downstream. For me it
    was the choice to immigrate — it affected my career, my partner, my friends, and even the
    language I speak and think in. Decisions like this compound, so make them deliberately.
- id: who-you-partner-with
  title: Who you choose as your life partner
  body: >-
    The last of the decisions that shape your life is who you choose as your life partner —
    and by extension, the people you spend your time with. Of everyone in that mix, your
    partner matters most. Get this one right.
