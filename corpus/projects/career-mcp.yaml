id: career-mcp
name: Career MCP + terminal portfolio
blurb: >-
  This server: a public, read-only Model Context Protocol server over a vetted,
  honesty-by-construction career corpus, powering a terminal-style portfolio where
  visitors chat about my work and request tailored resume drafts (Python, Streamable
  HTTP, deployed on Fly.io).
tags: [mcp, python, ai-native, open-source, design-engineering]

evidence:
  - id: cm-e1
    text: >-
      Designed and built a public, read-only MCP server (Python, FastMCP, Streamable HTTP)
      over a vetted career corpus, enforcing honesty-by-construction so it can only ever
      return curated data, and deployed it on Fly.io.
    tags: [mcp, python, ai-native, open-source]
  - id: cm-e2
    text: >-
      Hardened the public endpoint with rate limiting, body-size caps, and Origin / Host
      validation, plus a Pydantic integrity layer that fails closed on malformed data.
    tags: [security, backend, python]

bullets:
