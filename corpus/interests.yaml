# Personal interests. Voice content, returned verbatim by get_about.
- name: Playing sports
  note: >-
    I love playing sports and always have. I grew up playing soccer (football), did
    gymnastics at six and taekwondo for a couple of years, then moved into basketball through
    middle and high school, and picked up volleyball during undergrad, where we played in
    the courtyard of my university. After moving to Canada I added ping pong, beach volleyball,
    and tennis. These days I'm mostly playing beach volleyball and tennis.
- name: Programming and computers
  note: >-
    I've loved computers since I was a kid. I used to play online games and write scripts
    that ran them automatically overnight to farm loot. Looking back, that isn't far from
    the loop engineering I now do with coding agents like Claude Code.
- name: Reading
  note: >-
    I do my best to read for an hour before bed, mostly self-help, product, marketing, and
    business books. My current top three are The Mom Test, Different, and The Almanack of
    Naval Ravikant.
- name: Music
  note: >-
    I mostly listen to electronic music, and sometimes jazz, though I don't always know
    exactly who I'm listening to. Music runs in the background of how I work and work out,
    and it's a big part of going out dancing with my partner and friends.
