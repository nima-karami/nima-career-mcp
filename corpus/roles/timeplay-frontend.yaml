evidence:
  - id: tpfe-e1
    text: >-
      Introduced React into the company's stack to deliver its first WCAG/ADA-accessible
      game experiences, replacing a canvas game engine that could not be made accessible,
      to meet a partner's legal accessibility requirements.
    tags: [react, accessibility, technical-direction, 0-to-1]
  - id: tpfe-e2
    text: >-
      Was the primary engineer end to end on all six accessible mobile game controllers in
      the accessibility suite (React + Tailwind), passing a third-party accessibility audit
      and partner sign-off.
    tags: [accessibility, ownership, react]
  - id: tpfe-e3
    text: >-
      The accessible trivia controllers serve over 600,000 players per year, and the
      accessible controller became the default used even for other partners.
    metrics:
      - label: players per year
        value: "600,000+"
    tags: [scale, product, accessibility]

