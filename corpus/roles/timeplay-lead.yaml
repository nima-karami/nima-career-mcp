id: timeplay-lead
company_id: timeplay
org: TimePlay
title: Lead Full-Stack Developer
start: "2024-08"
end: null
location: Toronto, Ontario, Canada
summary: >-
  Lead full-stack developer on a real-money cruise-line gaming platform. Originated and
  built the bulk of its flagship web client, owned product and design on key games, and
  led a cross-functional team from kickoff through launch.
tags: [leadership, full-stack, product, design, frontend, 0-to-1, real-money, ai-native]

evidence:
  - id: tpl-e1
    text: >-
      Originated and built the bulk of a real-money gaming web client (React 18,
      TypeScript, Vite) for cruise-line partners, from the first commit through multiple
      production launches; the largest individual code contributor to the codebase.
    tags: [frontend, ownership, 0-to-1, react, typescript]
  - id: tpl-e2
    text: >-
      Created the real-money lottery and instant-win web client whose launch drove a
      +21% gross-revenue lift for the cruise-line partner.
    metrics:
      - label: partner gross-revenue lift
        value: "+21%"
    tags: [product, revenue, 0-to-1]
  - id: tpl-e3
    text: >-
      Built the lottery storefront, which converts at 35%, well above typical storefront
      benchmarks.
    metrics:
      - label: storefront conversion
        value: "35%"
    tags: [product, conversion, ecommerce]
  - id: tpl-e4
    text: >-
      Designed and built a partner-configuration system (feature flags, behavior, copy,
      and theming from a single source of truth) that serves seven major cruise-line
      brands without forking the codebase.
    metrics:
      - label: cruise-line brands served
        value: "7"
    tags: [architecture, configuration, white-label, scale]
  - id: tpl-e5
    text: >-
      Owned the UX and product of a Deal or No Deal mobile game end to end: designed the
      full flow in Figma, implemented the front end, and shipped it. The mobile launch
      increased players and gross revenue by 12%.
    metrics:
      - label: players and gross revenue
        value: "+12%"
    tags: [design, product, figma, frontend, revenue]
  - id: tpl-e6
    text: >-
      Built a full-stack product-analytics system: a client-side event pipeline
      (buffer / flush / retry) instrumented across the app, plus a batch
      activity-ingestion endpoint (Go, Gin, GORM / Postgres) with PII masking, and
      authored its documentation.
    tags: [analytics, full-stack, go, instrumentation, documentation]
  - id: tpl-e7
    text: >-
      Led a cross-functional team of up to seven developers (junior, contract, game, and
      backend developers) building the flagship web client from kickoff through its
      initial launch.
    tags: [leadership, team]
  - id: tpl-e8
    text: >-
      Built agent-operable engineering tooling: CLI-driven pipelines and an agentic
      pull-request review workflow that returns structured review reports, plus reusable
      machine-readable instructions ("skills") for coding agents shared with teammates.
    tags: [ai-native, tooling, agents, developer-experience]

