# Fly.io deploy config. Follows Fly's remote-MCP blueprint:
# https://fly.io/docs/blueprints/remote-mcp-servers/
app = "nima-career-mcp"
primary_region = "yyz"          # Toronto; change as desired

[build]
  dockerfile = "Dockerfile"

[env]
  NIMA_CORPUS_DIR = "/app/corpus"
  NIMA_ALLOWED_ORIGINS = ""                          # empty = any origin (public)
  NIMA_ALLOWED_HOSTS = "nima-career-mcp.fly.dev"     # add custom domains here, comma-separated
  NIMA_RATE_LIMIT_PER_MIN = "60"                     # per-IP

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1      # keep one machine always warm (no cold starts); extras autostop

  # Finite ceiling so a connection flood can't pile onto one small VM (Fly's default is unbounded).
  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

# MCP endpoint: https://<app>.fly.dev/mcp
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
