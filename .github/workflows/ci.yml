name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this job only reads the repo (no push/deploy/secrets).
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true          # keyed on uv.lock (committed)

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Verify (format, lint, types, SAST, tests)
        run: uv run python scripts/verify.py

  # Deeper taint analysis; Linux-only (Semgrep has no native Windows), so it lives
  # in CI rather than the local verify harness.
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
      - name: Semgrep scan
        run: semgrep scan --config=p/python --error
